# Hugo configuration file
title: James
baseURL: "https://ArthurWillers.github.io/james/"
description: "Documentação do projeto James. Feito com Hugo e o tema Hextra."
enableGitInfo: true
enableRobotsTXT: true
defaultContentLanguage: pt-br
languages:
  pt-br:
    locale: pt-BR
    direction: ltr
    label: Português
    weight: 1

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false
    copy:
      enable: true
      display: hover

menu:
  main:
    - name: Home
      pageRef: /
      weight: 1
    - name: Documentação
      pageRef: /docs
      weight: 2
    - name: Search
      weight: 3
      params:
        type: search
    - name: GitHub
      weight: 4
      url: "https://github.com/ArthurWillers/james"
      params:
        icon: github

params:
  displayUpdatedDate: true
  dateFormat: "2 de January de 2006"

  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: "logo.svg"
      width: 32
      height: 32

  footer:
    displayCopyright: true
    displayPoweredBy: true

  editURL:
    enable: true
    base: "https://github.com/ArthurWillers/james/edit/main/docs/content"

  theme:
    default: 'system'

  externalLinkDecoration: true

  search:
    enable: true
    type: flexsearch
    flexsearch:
      index: content
      tokenize: full
